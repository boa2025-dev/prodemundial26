name: Promo email - Octavos de Final open

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run (preview only, no emails sent)'
        type: boolean
        default: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Call promo-r16-open endpoint
        run: |
          if [ "${{ inputs.dryRun }}" = "true" ]; then
            curl --fail --silent --show-error -L \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "https://www.prodemundial26.online/api/cron/promo-r16-open?dryRun=1"
          else
            curl --fail --silent --show-error -L \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "https://www.prodemundial26.online/api/cron/promo-r16-open"
          fi
